<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parkour Dash & Boss Fight</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #87CEEB; /* Langit biru */
            color: #333;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            touch-action: none; 
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: 900;
            color: #333;
            text-shadow: 2px 2px 0px #fff;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .hud-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coin-icon {
            width: 25px;
            height: 25px;
            background: gold;
            border-radius: 50%;
            border: 3px solid #b8860b;
            box-shadow: 2px 2px 0px #fff;
        }

        /* Boss HP Bar */
        #boss-hp-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            background: #333;
            border: 4px solid #fff;
            border-radius: 15px;
            display: none; /* Sembunyi sampai bos muncul */
            box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        #boss-hp-bar {
            width: 100%;
            height: 100%;
            background: #FF0044;
            transition: width 0.2s ease;
        }

        #boss-name {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 22px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        #message-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            border: 4px solid #333;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
            text-align: center;
            pointer-events: auto;
            transition: opacity 0.3s ease;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #FF5722;
            text-shadow: 3px 3px 0px #333;
            text-transform: uppercase;
        }

        p {
            font-size: 16px;
            margin-bottom: 20px;
            color: #555;
            line-height: 1.5;
        }

        .controls-info span {
            color: #FF5722;
            font-weight: bold;
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            background: #FF5722;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 40px;
            border: 3px solid #333;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #333;
            transition: all 0.1s;
            text-transform: uppercase;
        }

        button:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #333;
        }
        
        button:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #333;
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 120px;
            display: none; 
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 5;
        }

        .control-group {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .btn-mobile {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            border: 3px solid #333;
            color: #333;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-mobile:active {
            background: rgba(255, 87, 34, 0.5);
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }

        .btn-action {
            background: rgba(255, 87, 34, 0.9);
            color: #fff;
        }

        .btn-action:active {
            background: rgba(255, 87, 34, 1);
        }

        /* Menu Stats & Shop */
        #menu-stats {
            margin-bottom: 20px;
            font-size: 18px;
            color: #FF5722;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        #shop-modal {
            position: absolute;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #333;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
            text-align: center;
            display: none;
            flex-direction: column;
            gap: 15px;
            pointer-events: auto;
            z-index: 20;
            max-width: 400px;
        }

        .shop-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .shop-item {
            border: 2px solid #333;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .shop-item:hover { transform: scale(1.05); }
        .shop-item.owned { border-color: #81C784; background: #e8f5e9; }
        .shop-item.equipped { border-color: #FF5722; background: #ffebee; }

        .skin-preview {
            width: 40px;
            height: 40px;
            margin: 0 auto 10px auto;
            border: 2px solid #333;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-item">Jarak: <span id="score">0</span>m</div>
        <div class="hud-item"><div class="coin-icon"></div> <span id="coin-score">0</span></div>
    </div>

    <div id="boss-hp-container">
        <div id="boss-hp-bar"></div>
        <div id="boss-name">BOSS: MATA ROBOT</div>
    </div>

    <div id="ui-layer">
        <div id="message-box">
            <h1 id="game-title">Parkour Dash</h1>
            <div id="menu-stats">High Score: <span id="high-score-display">0</span>m | Total Koin: <span id="total-coins-display">0</span></div>
            <p id="game-desc" class="controls-info">
                PC: <span>WASD / Panah</span> untuk gerak, <span>Spasi</span> Lompat, <span>Shift</span> Dash.<br>
                Tips: <span>DASH</span> menembus bos untuk memberikan Damage!<br><br>
                Kumpulkan koin dan bertahan hidup sejauh mungkin.
            </p>
            <div class="btn-group">
                <button id="start-btn">Mulai Game</button>
                <button id="shop-btn" style="background:#455A64;">Toko Koin</button>
            </div>
        </div>

        <div id="shop-modal">
            <h2 style="color:#333;">TOKO SKIN</h2>
            <div style="font-weight:bold; color:#b8860b;">Koin Anda: <span id="shop-coins">0</span></div>
            <div class="shop-items" id="shop-container">
                <!-- Items disisipkan JS -->
            </div>
            <button id="close-shop-btn" style="background:#555; font-size:16px; padding:10px 20px;">Tutup</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="control-group">
            <div class="btn-mobile" id="btn-left">◀</div>
            <div class="btn-mobile" id="btn-right">▶</div>
        </div>
        <div class="control-group">
            <div class="btn-mobile btn-action" id="btn-dash">⚡</div>
            <div class="btn-mobile btn-action" id="btn-jump">▲</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const coinScoreElement = document.getElementById('coin-score');
        const uiLayer = document.getElementById('ui-layer');
        const messageBox = document.getElementById('message-box');
        const startBtn = document.getElementById('start-btn');
        const gameTitle = document.getElementById('game-title');
        const gameDesc = document.getElementById('game-desc');
        const mobileControls = document.getElementById('mobile-controls');
        
        const bossHpContainer = document.getElementById('boss-hp-container');
        const bossHpBar = document.getElementById('boss-hp-bar');

        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        if (isTouchDevice) {
            mobileControls.style.display = 'flex';
        }

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- SISTEM SAVE LOKAL ---
        let gameData = {
            totalCoins: 0,
            highScore: 0,
            skins: ['#FF5722'],
            equippedSkin: '#FF5722'
        };

        function loadData() {
            let saved = localStorage.getItem('parkourDashSaveDataV2');
            if (saved) gameData = JSON.parse(saved);
            updateMenuStats();
        }

        function saveData() {
            localStorage.setItem('parkourDashSaveDataV2', JSON.stringify(gameData));
        }

        function updateMenuStats() {
            document.getElementById('high-score-display').innerText = Math.floor(gameData.highScore);
            document.getElementById('total-coins-display').innerText = gameData.totalCoins;
            document.getElementById('shop-coins').innerText = gameData.totalCoins;
        }

        // --- SISTEM AUDIO (SFX) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'jump') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'dash') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.05);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'powerup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        // --- GLOBAL VARIABLES ---
        let gameState = 'START'; 
        let score = 0;
        let coinsCollected = 0;
        let distanceScrolled = 0;
        let camera = { x: 0, y: 0, shake: 0 };
        let lastTime = 0;
        let globalTime = 0;
        
        const keys = { right: false, left: false, jump: false, dash: false };
        let jumpJustPressed = false;
        let dashJustPressed = false;

        // --- SISTEM INPUT ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                if (!keys.jump) jumpJustPressed = true;
                keys.jump = true;
            }
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                if (!keys.dash) dashJustPressed = true;
                keys.dash = true;
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') keys.jump = false;
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') keys.dash = false;
        });

        function bindTouchBtn(id, keyName, isAction) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                keys[keyName] = true;
                if (isAction === 'jump') jumpJustPressed = true;
                if (isAction === 'dash') dashJustPressed = true;
            });
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[keyName] = false;
            });
        }
        bindTouchBtn('btn-right', 'right');
        bindTouchBtn('btn-left', 'left');
        bindTouchBtn('btn-jump', 'jump', 'jump');
        bindTouchBtn('btn-dash', 'dash', 'dash');

        // --- ENTITAS KECIL (Koin & Partikel) ---
        class Coin {
            constructor(x, y) {
                this.x = x;
                this.baseY = y;
                this.y = y;
                this.w = 20;
                this.h = 20;
                this.collected = false;
                this.timeOffset = Math.random() * Math.PI * 2;
            }

            update(dt) {
                // Animasi mengambang
                this.y = this.baseY + Math.sin(globalTime * 3 + this.timeOffset) * 10;
                
                // Fitur Magnet 
                if (player.hasMagnet && !this.collected) {
                    let dx = (player.x + player.w/2) - (this.x + 10);
                    let dy = (player.y + player.h/2) - (this.y + 10);
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 300) {
                        this.x += (dx/dist) * 600 * dt;
                        this.baseY += (dy/dist) * 600 * dt;
                    }
                }

                // Cek tabrakan dengan player
                if (!this.collected && player.checkCollision(this)) {
                    this.collected = true;
                    coinsCollected++;
                    coinScoreElement.innerText = coinsCollected;
                    playSound('coin');
                    createParticles(this.x + 10, this.y + 10, 8, 'gold', 3);
                    
                    // Sedikit lompat skor
                    coinScoreElement.style.transform = "scale(1.5)";
                    setTimeout(() => coinScoreElement.style.transform = "scale(1)", 100);
                }
            }

            draw() {
                if (this.collected) return;
                ctx.save();
                ctx.translate(this.x + 10, this.y + 10);
                // Efek koin berputar 3D sederhana
                ctx.scale(Math.cos(globalTime * 4 + this.timeOffset), 1);
                
                ctx.beginPath();
                ctx.arc(0, 0, 10, 0, Math.PI * 2);
                ctx.fillStyle = 'gold';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#b8860b';
                ctx.stroke();
                
                // Garis tengah koin
                ctx.beginPath();
                ctx.moveTo(0, -6);
                ctx.lineTo(0, 6);
                ctx.stroke();
                
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, vx, vy, color, life) {
                this.x = x;
                this.y = y;
                this.vx = vx + (Math.random() - 0.5) * 100;
                this.vy = vy + (Math.random() - 0.5) * 100;
                this.color = color;
                this.life = life;
                this.maxLife = life;
                this.size = Math.random() * 5 + 3;
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.life -= dt;
                this.size *= 0.90; 
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // --- POWER UPS (Fitur Anti Boring Tambahan) ---
        class PowerUp {
            constructor(x, y, type) {
                this.x = x;
                this.baseY = y;
                this.y = y;
                this.w = 25;
                this.h = 25;
                this.type = type; // 'magnet' atau 'shield'
                this.collected = false;
                this.timeOffset = Math.random() * Math.PI * 2;
            }

            update(dt) {
                this.y = this.baseY + Math.sin(globalTime * 4 + this.timeOffset) * 15;
                if (!this.collected && player.checkCollision(this)) {
                    this.collected = true;
                    playSound('powerup');
                    if (this.type === 'magnet') {
                        player.hasMagnet = true;
                        player.magnetTimer = 10; // Aktif 10 detik
                        createParticles(this.x, this.y, 15, '#00BCD4', 4);
                    } else if (this.type === 'shield') {
                        player.hasShield = true;
                        createParticles(this.x, this.y, 15, '#4CAF50', 4);
                    }
                }
            }

            draw() {
                if (this.collected) return;
                ctx.save();
                ctx.translate(this.x + this.w/2, this.y + this.h/2);
                ctx.rotate(globalTime * 2);
                
                ctx.fillStyle = this.type === 'magnet' ? '#00BCD4' : '#4CAF50';
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.rotate(-globalTime * 2); // Putar balik buat teks biar tetap tegak
                ctx.fillText(this.type === 'magnet' ? 'M' : 'S', 0, 0);

                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.r = 8;
                this.active = true;
            }

            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;

                // Trail partikel api
                if (Math.random() > 0.5) {
                    particles.push(new Particle(this.x, this.y, -this.vx*0.2, -this.vy*0.2, '#FF0044', 0.2));
                }

                // Kena player?
                if (this.active && !player.isDashing) {
                    // Hitbox lingkaran peluru ke kotak player
                    let testX = Math.max(player.x, Math.min(this.x, player.x + player.w));
                    let testY = Math.max(player.y, Math.min(this.y, player.y + player.h));
                    let distX = this.x - testX;
                    let distY = this.y - testY;
                    if ((distX*distX + distY*distY) < this.r*this.r) {
                        if (player.hasShield) {
                            player.hasShield = false;
                            this.active = false;
                            playSound('hit');
                            createParticles(player.x + player.w/2, player.y + player.h/2, 20, '#4CAF50', 5);
                        } else {
                            gameOver("TERKENA LASER BOSS!");
                            this.active = false;
                        }
                    }
                }
            }

            draw() {
                if (!this.active) return;
                ctx.save();
                ctx.fillStyle = '#FF0044';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r/2, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        // --- ENTITAS UTAMA ---

        class Boss {
            constructor() {
                this.reset();
            }

            reset() {
                this.active = false;
                this.x = 0;
                this.y = 0;
                this.w = 80;
                this.h = 80;
                this.maxHp = 5;
                this.hp = this.maxHp;
                this.state = 'hidden'; // hidden, entering, fighting, dying
                this.shootTimer = 0;
                this.hoverOffset = 0;
                
                // Posisi target
                this.targetX = 0;
                this.targetY = 0;
            }

            spawn(startX, startY) {
                this.active = true;
                this.x = startX + 500; // Mulai dari luar layar kanan
                this.y = startY - 200;
                this.hp = this.maxHp;
                this.state = 'entering';
                
                bossHpContainer.style.display = 'block';
                this.updateHpBar();
                createParticles(this.x, this.y, 50, '#333', 10);
            }

            updateHpBar() {
                bossHpBar.style.width = `${(this.hp / this.maxHp) * 100}%`;
            }

            takeDamage() {
                this.hp--;
                this.updateHpBar();
                playSound('hit');
                createParticles(this.x + this.w/2, this.y + this.h/2, 30, '#FF0044', 8);
                camera.shake = 15;

                // Flash putih (di-handle di draw)
                this.isFlashing = 0.1; 

                if (this.hp <= 0) {
                    this.die();
                } else {
                    // Knockback sedikit saat kena hit
                    this.x += 100;
                }
            }

            die() {
                this.state = 'dying';
                bossHpContainer.style.display = 'none';
                camera.shake = 30;
                playSound('hit');
                
                // Ledakan besar
                createParticles(this.x + this.w/2, this.y + this.h/2, 100, '#FF5722', 15);
                
                // Jatuhkan buanyak koin (Loot explosion)
                for(let i=0; i<15; i++) {
                    let c = new Coin(this.x + this.w/2 + (Math.random()*100-50), this.y + this.h/2 + (Math.random()*100-50));
                    c.baseY = c.y; // Koin mengambang di udara bebas
                    coins.push(c);
                }

                setTimeout(() => {
                    this.active = false;
                    this.state = 'hidden';
                }, 500); // Tunggu bentar sebelum hilang total
            }

            update(dt) {
                if (!this.active || this.state === 'dying') return;

                if (this.isFlashing > 0) this.isFlashing -= dt;

                this.hoverOffset += dt * 3;

                // Perilaku Boss
                if (this.state === 'entering') {
                    // Maju pelan ke arah player
                    this.targetX = player.x + width/3;
                    this.targetY = player.y - 150;
                    
                    this.x += (this.targetX - this.x) * 2 * dt;
                    this.y += (this.targetY - this.y) * 2 * dt;

                    if (Math.abs(this.x - this.targetX) < 50) {
                        this.state = 'fighting';
                    }
                } 
                else if (this.state === 'fighting') {
                    // Ikuti player, tapi melayang naik turun
                    this.targetX = player.x + width/2.5;
                    this.targetY = player.y - 150 + Math.sin(this.hoverOffset) * 50;

                    this.x += (this.targetX - this.x) * 3 * dt;
                    this.y += (this.targetY - this.y) * 3 * dt;

                    // Menembak
                    this.shootTimer -= dt;
                    if (this.shootTimer <= 0) {
                        this.shootTimer = 1.2; // Tembak tiap 1.2 detik
                        playSound('jump'); // Suara tembakan pelan
                        
                        // Hitung arah tembakan (Arahin ke player)
                        let dx = (player.x + player.w/2) - (this.x + this.w/2);
                        let dy = (player.y + player.h/2) - (this.y + this.h/2);
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        let speed = 400;

                        projectiles.push(new Projectile(
                            this.x + this.w/2, 
                            this.y + this.h/2 + 20, 
                            (dx/dist)*speed, 
                            (dy/dist)*speed
                        ));
                        
                        // Recoil mundur dikit
                        this.x += 20;
                    }

                    // Logika tabrakan Boss vs Player (Damage Boss dengan Dash)
                    if (player.isDashing) {
                        // Kotak boss vs kotak player
                        if (player.x < this.x + this.w &&
                            player.x + player.w > this.x &&
                            player.y < this.y + this.h &&
                            player.y + player.h > this.y) 
                        {
                            this.takeDamage();
                            // Bikin player nendang mundur (biar gak nge-hit berkali-kali dalam 1 dash)
                            player.vx = -800;
                            player.vy = -400;
                            player.isDashing = false;
                        }
                    } else if (player.checkCollision({x: this.x, y: this.y, w: this.w, h: this.h})) {
                        // Kalo nabrak biasa, player yang mati
                        if (player.hasShield) {
                            player.hasShield = false;
                            player.vx = -800;
                            player.vy = -400;
                            playSound('hit');
                            createParticles(player.x + player.w/2, player.y + player.h/2, 20, '#4CAF50', 5);
                        } else {
                            gameOver("NABRAK BOSS!");
                        }
                    }
                }
            }

            draw() {
                if (!this.active || this.state === 'dying') return;

                ctx.save();
                ctx.translate(this.x + this.w/2, this.y + this.h/2);
                
                // Floating animation logic rotation
                ctx.rotate(Math.sin(this.hoverOffset * 0.5) * 0.1);

                if (this.isFlashing > 0) {
                    ctx.fillStyle = '#fff';
                } else {
                    ctx.fillStyle = '#333';
                }

                // Badan utama boss (Kotak bulat)
                ctx.beginPath();
                ctx.roundRect(-this.w/2, -this.h/2, this.w, this.h, 15);
                ctx.fill();

                // Sayap mesin
                ctx.fillStyle = '#555';
                ctx.fillRect(-this.w/2 - 20, -10, 20, 20); // Sayap kiri
                ctx.fillRect(this.w/2, -10, 20, 20);      // Sayap kanan
                
                // Efek Jet di bawah sayap
                ctx.fillStyle = '#FF5722';
                ctx.globalAlpha = 0.7 + Math.random()*0.3;
                ctx.beginPath();
                ctx.moveTo(-this.w/2 - 15, 10);
                ctx.lineTo(-this.w/2 - 5, 10);
                ctx.lineTo(-this.w/2 - 10, 30 + Math.random()*20);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(this.w/2 + 5, 10);
                ctx.lineTo(this.w/2 + 15, 10);
                ctx.lineTo(this.w/2 + 10, 30 + Math.random()*20);
                ctx.fill();
                ctx.globalAlpha = 1;

                // Mata Besar (Bersinar)
                ctx.fillStyle = '#FF0044';
                ctx.beginPath();
                ctx.arc(0, 0, 25, 0, Math.PI*2);
                ctx.fill();

                // Pupil hitam
                ctx.fillStyle = '#111';
                // Lacak player dengan mata
                let eyeOffset = 0;
                if (this.state === 'fighting') eyeOffset = (player.x - this.x < 0) ? -8 : 8;
                ctx.beginPath();
                ctx.arc(eyeOffset, 0, 10, 0, Math.PI*2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Player {
            constructor() {
                this.w = 30;
                this.h = 40;
                this.reset();
            }

            reset() {
                this.x = 100;
                this.y = height / 2 - 100; // Mulai dari tengah aman
                this.vx = 0;
                this.vy = 0;
                this.speed = 450; 
                this.jumpForce = -750;
                this.gravity = 2000;
                this.friction = 0.80; 
                
                this.isGrounded = false;
                this.jumpsLeft = 2;
                this.wallSliding = false;
                this.wallDirection = 0; 
                
                this.isDashing = false;
                this.dashTime = 0;
                this.dashDuration = 0.15; 
                this.dashSpeed = 1500;
                this.dashCooldown = 0;
                this.canDash = true;

                this.coyoteTime = 0;
                this.jumpBuffer = 0;

                // Powerups
                this.hasMagnet = false;
                this.magnetTimer = 0;
                this.hasShield = false;

                // Skin dari data
                this.color = gameData.equippedSkin || '#FF5722'; 
            }

            update(dt) {
                if (this.dashCooldown > 0) this.dashCooldown -= dt;
                if (this.coyoteTime > 0) this.coyoteTime -= dt;
                if (this.jumpBuffer > 0) this.jumpBuffer -= dt;
                if (this.magnetTimer > 0) {
                    this.magnetTimer -= dt;
                    if (this.magnetTimer <= 0) this.hasMagnet = false;
                }

                if (this.isGrounded) {
                    this.coyoteTime = 0.1; 
                }
                
                if (jumpJustPressed) {
                    this.jumpBuffer = 0.15; 
                }

                // --- DASH LOGIC ---
                if (dashJustPressed && this.canDash && this.dashCooldown <= 0) {
                    this.isDashing = true;
                    this.dashTime = this.dashDuration;
                    this.canDash = false; 
                    this.vy = 0; 
                    this.vx = keys.left ? -this.dashSpeed : this.dashSpeed; 
                    if (!keys.left && !keys.right) this.vx = this.dashSpeed; 
                    
                    playSound('dash');
                    createParticles(this.x + this.w/2, this.y + this.h/2, 20, '#fff', 5);
                    camera.shake = 8;
                }

                if (this.isDashing) {
                    this.dashTime -= dt;
                    if (this.dashTime <= 0) {
                        this.isDashing = false;
                        this.dashCooldown = 0.4;
                        this.vx *= 0.4; 
                    }
                    if (Math.random() > 0.3) {
                        particles.push(new Particle(this.x + this.w/2, this.y + this.h/2 + (Math.random()*20-10), 0, 0, this.color, 0.2));
                    }
                } else {
                    // --- NORMAL MOVEMENT ---
                    let moveDir = 0;
                    if (keys.right) moveDir += 1;
                    if (keys.left) moveDir -= 1;

                    if (moveDir !== 0) {
                        this.vx += moveDir * this.speed * 8 * dt;
                    } else {
                        this.vx *= Math.pow(this.friction, dt * 60);
                    }

                    if (Math.abs(this.vx) > this.speed) {
                        this.vx = Math.sign(this.vx) * this.speed;
                    }

                    // Gravitasi & Wall Slide
                    if (this.wallSliding && this.vy > 0) {
                        this.vy = 150; 
                        if (Math.random() > 0.8) {
                            createParticles(this.wallDirection > 0 ? this.x + this.w : this.x, this.y + this.h, 1, '#ccc', 2);
                        }
                    } else {
                        this.vy += this.gravity * dt;
                    }
                    if (this.vy > 1200) this.vy = 1200; 

                    // Salto Animasi dihapus
                }

                let nextX = this.x + this.vx * dt;
                let nextY = this.y + this.vy * dt;

                this.isGrounded = false;
                this.wallSliding = false;
                this.wallDirection = 0;

                // Tabrakan Axis X
                this.x = nextX;
                for (let plat of platforms) {
                    if (this.checkCollision(plat)) {
                        if (this.vx > 0) { 
                            this.x = plat.x - this.w;
                            this.wallDirection = 1;
                        } else if (this.vx < 0) { 
                            this.x = plat.x + plat.w;
                            this.wallDirection = -1;
                        }
                        this.vx = 0;
                        if (!this.isGrounded && this.vy > 0) {
                            this.wallSliding = true;
                            this.rotation = 0; // Berhenti mutar kalau nempel tembok
                        }
                    }
                }

                // Tabrakan Axis Y
                this.y += this.vy * dt;
                for (let plat of platforms) {
                    if (this.checkCollision(plat)) {
                        if (this.vy > 0) { 
                            if (this.vy > 900) {
                                camera.shake = 8;
                                createParticles(this.x + this.w/2, this.y + this.h, 15, '#bbb', 4);
                            }
                            this.y = plat.y - this.h;
                            this.isGrounded = true;
                            this.jumpsLeft = 2; 
                            this.canDash = true; 
                        } else if (this.vy < 0) { 
                            this.y = plat.y + plat.h;
                        }
                        this.vy = 0;
                    }
                }

                // --- JUMP LOGIC ---
                if (this.jumpBuffer > 0) {
                    if (this.wallSliding) {
                        this.vy = this.jumpForce * 0.9;
                        this.vx = this.wallDirection * -this.speed * 1.3; 
                        this.wallSliding = false;
                        this.isDashing = false;
                        this.jumpBuffer = 0;
                        playSound('jump');
                        createParticles(this.wallDirection > 0 ? this.x + this.w : this.x, this.y + this.h/2, 10, '#ddd', 4);
                    } else if (this.coyoteTime > 0) {
                        this.vy = this.jumpForce;
                        this.coyoteTime = 0;
                        this.jumpBuffer = 0;
                        this.jumpsLeft--;
                        playSound('jump');
                        createParticles(this.x + this.w/2, this.y + this.h, 10, '#ddd', 3);
                    } else if (this.jumpsLeft > 0 && !this.isGrounded) {
                        this.vy = this.jumpForce * 0.85;
                        this.jumpsLeft--;
                        this.jumpBuffer = 0;
                        this.isDashing = false; 
                        
                        playSound('jump');
                        createParticles(this.x + this.w/2, this.y + this.h, 15, this.color, 4);
                    }
                }

                // --- BATAS KEMATIAN JATUH ---
                if (this.y > camera.y + height + 100) {
                    if (this.hasShield) {
                        // Pantulkan ke atas dengan kuat jika punya tameng
                        this.hasShield = false;
                        this.vy = -1600;
                        playSound('hit');
                        createParticles(this.x + this.w/2, this.y + this.h/2, 30, '#4CAF50', 6);
                    } else {
                        gameOver("TERJATUH KE JURANG!");
                    }
                }
            }

            draw() {
                ctx.save();
                
                let squashX = this.w;
                let squashY = this.h;

                if (this.isDashing) {
                    squashX = this.w + 25;
                    squashY = this.h - 20;
                } else if (!this.isGrounded) {
                    let stretch = Math.min(Math.abs(this.vy) / 100, 10);
                    squashY = this.h + stretch;
                    squashX = this.w - stretch/2;
                }

                let drawX = this.x + (this.w - squashX) / 2;
                let drawY = this.y + (this.h - squashY); 

                // Gambar Shield (Aura Hijau)
                if (this.hasShield) {
                    ctx.beginPath();
                    ctx.arc(drawX + squashX/2, drawY + squashY/2, squashY/2 + 10, 0, Math.PI*2);
                    ctx.fillStyle = 'rgba(76, 175, 80, 0.3)';
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#4CAF50';
                    ctx.stroke();
                }

                // Gambar Magnet (Aura Biru Bergerak)
                if (this.hasMagnet) {
                    ctx.beginPath();
                    ctx.arc(drawX + squashX/2, drawY + squashY/2, squashY/2 + 20 + Math.sin(globalTime*10)*5, 0, Math.PI*2);
                    ctx.strokeStyle = 'rgba(0, 188, 212, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                ctx.fillStyle = this.color;
                ctx.fillRect(drawX, drawY, squashX, squashY);

                // Mata
                ctx.fillStyle = '#fff';
                let eyeOffsetX = keys.left ? -5 : (keys.right ? 5 : 0);
                
                // Kalau dash, matanya sipit (garis)
                if (this.isDashing) {
                    ctx.fillRect(eyeOffsetX - 5, -5, 6, 2);
                    ctx.fillRect(eyeOffsetX + 3, -5, 6, 2);
                } else {
                    ctx.fillRect(eyeOffsetX - 5, -5, 5, 5);
                    ctx.fillRect(eyeOffsetX + 3, -5, 5, 5);
                }

                ctx.restore();
            }

            checkCollision(rect) {
                return this.x < rect.x + rect.w &&
                       this.x + this.w > rect.x &&
                       this.y < rect.y + rect.h &&
                       this.y + this.h > rect.y;
            }
        }

        class Platform {
            constructor(x, y, w, h) {
                this.x = x;
                this.y = y;
                this.w = w;
                this.h = h;
            }

            draw() {
                ctx.save();
                ctx.fillStyle = '#455A64'; 
                ctx.fillRect(this.x, this.y, this.w, this.h);
                
                ctx.fillStyle = '#81C784'; 
                ctx.fillRect(this.x, this.y, this.w, 10);
                ctx.restore();
            }
        }

        // --- MANAJEMEN GAME ---

        let player = new Player();
        let gameBoss = new Boss();
        let platforms = [];
        let particles = [];
        let coins = [];
        let projectiles = [];
        let powerups = [];
        
        let levelEnd = 0; 
        let nextBossDistance = 2500;

        function createParticles(x, y, count, color, speedMultiplier = 1) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(
                    x, y, 
                    (Math.random() - 0.5) * 150 * speedMultiplier, 
                    (Math.random() - 0.5) * 150 * speedMultiplier, 
                    color, 
                    Math.random() * 0.4 + 0.1
                ));
            }
        }

        function generateWorld() {
            if (platforms.length === 0) {
                platforms.push(new Platform(-100, height - 150, 800, 500));
                levelEnd = 700;
            }

            while (levelEnd < camera.x + width * 2) {
                let gapX = Math.random() * 150 + 100; 
                let platW = Math.random() * 250 + 150; 
                
                let type = Math.floor(Math.random() * 10);
                let platY;

                // Batas Y atas agar tidak keluar screen terus
                let minY = 150; 

                if (type < 5) {
                    platY = height - 150 - Math.random() * 80;
                } else if (type < 8) {
                    platY = height - 250 - Math.random() * 100;
                } else {
                    platY = height - 350;
                    platW = 80; 
                    platforms.push(new Platform(levelEnd + gapX - 30, height - 50, 150, 400));
                }

                if (platY < minY) platY = minY;

                platforms.push(new Platform(levelEnd + gapX, platY, platW, 800)); 
                
                // --- GENERATE KOIN ---
                // 50% kemungkinan ada koin di atas platform baru
                if (Math.random() > 0.5) {
                    let numCoins = Math.floor(Math.random() * 3) + 2; // 2-4 koin
                    let step = platW / (numCoins + 1);
                    for(let i = 1; i <= numCoins; i++) {
                        // Koin bentuk melengkung seperti pelangi di atas platform
                        let archY = Math.sin((i / (numCoins+1)) * Math.PI) * 40;
                        coins.push(new Coin(levelEnd + gapX + step * i - 10, platY - 40 - archY));
                    }
                }

                // --- GENERATE POWERUPS ---
                // 5% kemunculan di tiap platform
                if (Math.random() < 0.05) {
                    let type = Math.random() > 0.5 ? 'magnet' : 'shield';
                    powerups.push(new PowerUp(levelEnd + gapX + platW/2, platY - 60, type));
                }

                levelEnd += gapX + platW;
            }

            // Garbage Collection (bersihkan object yang udah jauh di belakang)
            platforms = platforms.filter(p => p.x + p.w > camera.x - width);
            coins = coins.filter(c => c.x > camera.x - width && !c.collected);
            projectiles = projectiles.filter(p => p.x > camera.x - width && p.active);
            powerups = powerups.filter(p => p.x > camera.x - width && !p.collected);
        }

        function startGame() {
            // Aktifkan Engine Audio
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            player.reset();
            gameBoss.reset();
            platforms = [];
            particles = [];
            coins = [];
            projectiles = [];
            powerups = [];
            
            gameState = 'PLAYING';
            uiLayer.classList.add('hidden');
            generateWorld();
            
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameOver(reason) {
            gameState = 'GAMEOVER';
            uiLayer.classList.remove('hidden');
            bossHpContainer.style.display = 'none';
            playSound('hit');
            
            gameTitle.innerText = reason || "GAME OVER";
            gameTitle.style.color = "#FF0044";
            gameTitle.style.textShadow = "3px 3px 0px #333";
            
            // Kalkulasi Total Skor
            let finalScore = Math.floor(score) + (coinsCollected * 50);

            // Simpan Progress ke Local Storage
            gameData.totalCoins += coinsCollected;
            if (finalScore > gameData.highScore) {
                gameData.highScore = finalScore;
            }
            saveData();
            updateMenuStats();

            gameDesc.innerHTML = `Jarak: ${Math.floor(score)}m<br>Koin: ${coinsCollected} x 50<br><b>TOTAL SKOR: <span style="font-size: 24px;">${finalScore}</span></b>`;
            startBtn.innerText = "COBA LAGI";
            
            createParticles(player.x + player.w/2, player.y + player.h/2, 50, '#FF0044', 5);
            camera.shake = 30;
        }

        // --- SISTEM WARNA SIANG-MALAM ---
        const timeColors = [
            { r: 255, g: 200, b: 200 }, // Pagi
            { r: 135, g: 206, b: 235 }, // Siang
            { r: 255, g: 140, b: 0   }, // Sore
            { r: 10,  g: 10,  b: 40  }  // Malam
        ];

        function getBackgroundColor() {
            let cycleTime = 60; // 1 Siklus Penuh = 60 detik
            let timeInCycle = Math.max(0, globalTime || 0) % cycleTime;
            
            let phaseProgress = timeInCycle / (cycleTime / 4);
            let currentPhase = Math.floor(phaseProgress) % 4; // Ditambah % 4 untuk pencegahan bug
            let nextPhase = (currentPhase + 1) % 4;
            let lerp = phaseProgress - Math.floor(phaseProgress);

            let c1 = timeColors[currentPhase];
            let c2 = timeColors[nextPhase];

            // Fallback aman jika terdapat kejanggalan dalam penghitungan globalTime
            if (!c1 || !c2) return 'rgb(135, 206, 235)'; 

            let r = Math.floor(c1.r + (c2.r - c1.r) * lerp);
            let g = Math.floor(c1.g + (c2.g - c1.g) * lerp);
            let b = Math.floor(c1.b + (c2.b - c1.b) * lerp);

            return `rgb(${r}, ${g}, ${b})`;
        }

        // --- GAME LOOP ---

        function update(dt) {
            if (dt > 0.1) dt = 0.1;
            globalTime += dt;

            if (gameState === 'PLAYING') {
                player.update(dt);
                
                // Update Skor Jarak
                if (player.x / 10 > score) {
                    score = player.x / 10;
                    scoreElement.innerText = Math.floor(score);
                }

                // Cek Spawn Boss
                if (!gameBoss.active && score > nextBossDistance) {
                    gameBoss.spawn(player.x, player.y);
                    nextBossDistance += 3000; // Boss selanjutnya muncul 3000m kemudian
                }

                if (gameBoss.active) {
                    gameBoss.update(dt);
                }

                for(let c of coins) c.update(dt);
                for(let p of projectiles) p.update(dt);
                for(let p of powerups) p.update(dt);

                generateWorld();

                // --- KAMERA LOGIC ---
                let targetCamX = player.x - width / 3;
                let targetCamY = player.y - height / 1.5;

                // Jangan mundur ke kiri
                if (targetCamX < camera.x) targetCamX = camera.x;
                
                // KUNCI KAMERA: Jangan sampai turun melebihi batas Y tertentu (mencegah bug jatuh infitit)
                // Tinggi minimum platform sekitar height - 50. Jadi kita buat kamera tidak bisa menembus itu.
                let maxCamY = 100; // Maksimal kamera boleh turun ke Y=100
                if (targetCamY > maxCamY) targetCamY = maxCamY;

                camera.x += (targetCamX - camera.x) * 5 * dt;
                camera.y += (targetCamY - camera.y) * 3 * dt;
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(dt);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            if (camera.shake > 0) {
                camera.shake *= 0.9; 
                if (camera.shake < 0.5) camera.shake = 0;
            }

            jumpJustPressed = false;
            dashJustPressed = false;
        }

        function draw() {
            // Background siang-malam dinamis
            ctx.fillStyle = getBackgroundColor();
            ctx.fillRect(0, 0, width, height);
            
            // Bintang jika sudah malam
            let isNightProgress = (globalTime % 60) / 60; // 0.75 - 1.0 adalah malam
            if (isNightProgress > 0.6 && isNightProgress < 0.9) {
                let starAlpha = Math.sin((isNightProgress - 0.6) * Math.PI / 0.3);
                ctx.fillStyle = `rgba(255, 255, 255, ${starAlpha * 0.8})`;
                let startX = Math.floor(camera.x / 1000) * 1000;
                for (let x = startX - 1000; x < startX + width + 1000; x += 150) {
                    let starX = x + (camera.x * 0.8) % 150; 
                    ctx.fillRect(starX, 100 + (x%200), 3, 3);
                    ctx.fillRect(starX + 50, 200 + (x%150), 2, 2);
                }
            }

            ctx.save();
            
            let shakeX = (Math.random() - 0.5) * camera.shake;
            let shakeY = (Math.random() - 0.5) * camera.shake;
            ctx.translate(-camera.x + shakeX, -camera.y + shakeY);

            // Awan Parallax
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            let startX = Math.floor(camera.x / 500) * 500;
            for(let x = startX - 500; x < startX + width + 500; x += 400) {
                let parallaxX = x + (camera.x * 0.5) % 400; 
                ctx.beginPath();
                ctx.arc(parallaxX, 150, 40, 0, Math.PI * 2);
                ctx.arc(parallaxX + 50, 130, 60, 0, Math.PI * 2);
                ctx.arc(parallaxX + 100, 150, 40, 0, Math.PI * 2);
                ctx.fill();
            }

            for (let plat of platforms) plat.draw();
            for (let c of coins) c.draw();
            for (let p of projectiles) p.draw();
            for (let p of powerups) p.draw();
            if (gameBoss.active) gameBoss.draw();
            
            if (gameState === 'PLAYING') player.draw();
            for (let p of particles) p.draw();

            ctx.restore();
        }

        function gameLoop(timestamp) {
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            update(dt);
            draw();

            if (gameState === 'PLAYING' || particles.length > 0) {
                requestAnimationFrame(gameLoop);
            }
        }

        // --- INISIALISASI & SHOP LOGIC ---
        startBtn.addEventListener('click', startGame);
        
        const shopBtn = document.getElementById('shop-btn');
        const shopModal = document.getElementById('shop-modal');
        const closeShopBtn = document.getElementById('close-shop-btn');
        const shopContainer = document.getElementById('shop-container');

        const skinsAvailable = [
            { id: '#FF5722', name: 'Oranye', cost: 0 },
            { id: '#2196F3', name: 'Biru', cost: 100 },
            { id: '#E91E63', name: 'Pink', cost: 200 },
            { id: '#9C27B0', name: 'Ungu', cost: 300 },
            { id: '#00E676', name: 'Neon', cost: 500 },
            { id: '#FFEB3B', name: 'Emas', cost: 1000 }
        ];

        function renderShop() {
            document.getElementById('shop-coins').innerText = gameData.totalCoins;
            shopContainer.innerHTML = '';
            
            skinsAvailable.forEach(skin => {
                let div = document.createElement('div');
                div.className = 'shop-item';
                
                let isOwned = gameData.skins.includes(skin.id);
                let isEquipped = gameData.equippedSkin === skin.id;
                
                if (isOwned) div.classList.add('owned');
                if (isEquipped) div.classList.add('equipped');

                div.innerHTML = `
                    <div class="skin-preview" style="background-color: ${skin.id}"></div>
                    <div style="font-size:12px; font-weight:bold;">${skin.name}</div>
                    <div style="font-size:12px;">${isOwned ? (isEquipped ? 'Dipakai' : 'Milikmu') : '🪙 ' + skin.cost}</div>
                `;

                div.onclick = () => {
                    if (isOwned) {
                        gameData.equippedSkin = skin.id;
                        player.color = skin.id;
                        saveData();
                        renderShop();
                    } else if (gameData.totalCoins >= skin.cost) {
                        gameData.totalCoins -= skin.cost;
                        gameData.skins.push(skin.id);
                        gameData.equippedSkin = skin.id;
                        player.color = skin.id;
                        saveData();
                        renderShop();
                        updateMenuStats();
                        playSound('coin');
                    } else {
                        let coinText = document.getElementById('shop-coins');
                        coinText.style.color = 'red';
                        setTimeout(() => coinText.style.color = '#b8860b', 500);
                    }
                };

                shopContainer.appendChild(div);
            });
        }

        shopBtn.addEventListener('click', () => {
            document.getElementById('message-box').style.display = 'none';
            shopModal.style.display = 'flex';
            renderShop();
        });

        closeShopBtn.addEventListener('click', () => {
            shopModal.style.display = 'none';
            document.getElementById('message-box').style.display = 'block';
        });

        loadData(); // Load save data awal
        
        camera.x = 0; camera.y = 0;
        platforms.push(new Platform(0, height - 100, width, 200));
        draw();

    </script>
</body>
</html>
